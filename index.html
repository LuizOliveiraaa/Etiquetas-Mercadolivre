<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiquetas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<link rel="icon" type="image/png" href="https://luizoliveiraaa.github.io/Etiquetas-Mercadolivre/favicon.png">

<style>
@page {
    size: A4;
    margin: 0;
}

body { 
    margin:0; 
    font-family: Arial; 
}

.page {
    width: 210mm;
    height: 297mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5mm;
    padding: 10mm;
    box-sizing: border-box;
    page-break-after: always;
}

.etiqueta {
    border: 2px solid black;
    display: flex;
    flex-direction: column;
}

.topo {
    background: #ffe600;
    text-align: center;
    padding: 8px;
}

.topo img { 
    height: 55px;
    max-width: 100%;
}

.titulo {
    background: #eee;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    padding: 6px;
}

.nome {
    text-align: center;
    font-size: 18px;
    padding: 8px;
    font-weight: bold;
}

.qr {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-grow: 1;
    padding: 10px;
}

.footer {
    background: #003a8f;
    text-align: center;
    padding: 8px;
    color: white;
    font-size: 12px;
}

.footer img { 
    height: 30px; 
    display: block;
    margin: 0 auto 5px;
}

.sem-dados {
    text-align: center;
    margin-top: 100px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="paginas"></div>

<script>

// 🔥 SEMID
function formatarSemid(numero) {
    numero = String(numero).replace("SEMID-", "").trim();

    if (numero.length < 5) {
        numero = numero.padStart(5, '0');
    }

    return `semid_sal1_${numero}`;
}

// 🔥 MODO ZPL (AGORA FUNCIONA PRA TUDO)
function modoZPL(lista) {
    const url = new URL(window.location.href);
    const zpl = url.searchParams.get("zpl");

    if (!zpl) return false;

    let resultado = "";

    lista.forEach(item => {

        let codigo;

        if (item.startsWith("SEMID")) {
            let numero = item.replace("SEMID-", "");
            codigo = formatarSemid(numero);
        } else {
            let [numero, tipo] = item.split("-");
            let comId = tipo === "com";
            codigo = `G1_SAL${numero} ${comId ? "com ID" : "sem ID"}`;
        }

        resultado += `
^XA
^PW800
^LL600

^CF0,35

^FO50,30^FDSALVADOS - SAL1^FS

^FO50,90^A0N,45,45^FD${codigo}^FS

^FO50,160^BY3
^BCN,140,Y,N,N
^FD${codigo}^FS

^FO50,330^A0N,30,30^FDID: ${codigo}^FS

^FO550,350^BQN,2,5
^FDLA,${codigo}^FS

^XZ
`;
    });

    document.body.innerHTML = `
        <h2 style="font-family: Arial">Modo Zebra 🏷️</h2>
        <p>Copie o código abaixo:</p>
        <textarea style="width:100%;height:400px;">${resultado}</textarea>
    `;

    return true;
}

// 🔥 PARAMETROS
function getParametros() {
    const url = new URL(window.location.href);

    const dados = url.searchParams.get("dados");
    const inicio = url.searchParams.get("inicio");
    const fim = url.searchParams.get("fim");

    let lista = [];

    if (dados) {
        lista = dados.split(",");
    }
    else if (inicio && fim) {
        for (let i = parseInt(inicio); i <= parseInt(fim); i++) {
            lista.push("SEMID-" + i);
        }
    }

    return lista;
}

// 🔥 GERAR
function gerar() {
    let lista = getParametros();
    let container = document.getElementById("paginas");

    if (modoZPL(lista)) return;

    if (!lista || lista.length === 0) {
        container.innerHTML = `
            <div class="sem-dados">
                <h2>Nenhum dado recebido</h2>
                <p>Use o AppSheet para gerar etiquetas automaticamente.</p>
                <br>
                <small>
                    Equipe Inventario - Kuehne Nagel SAL1<br>
                    Cada Pacote Importa!
                </small>
            </div>
        `;
        return;
    }

    let page;
    let count = 0;

    lista.forEach((item, index) => {

        let numero, tipo, comId, texto;

        if (item.startsWith("SEMID")) {

            numero = item.replace("SEMID-", "");
            texto = formatarSemid(numero);

        } else {

            [numero, tipo] = item.split("-");
            comId = tipo === "com";

            texto = `G1_SAL${numero} ${comId ? "com ID" : "sem ID"}`;
        }

        if (count % 4 === 0) {
            page = document.createElement("div");
            page.className = "page";
            container.appendChild(page);
        }

        let etiqueta = document.createElement("div");
        etiqueta.className = "etiqueta";

        etiqueta.innerHTML = `
            <div class="topo">
                <img src="https://luizoliveiraaa.github.io/Etiquetas-Mercadolivre/logomeli.png">
            </div>

            <div class="titulo">
                ${item.startsWith("SEMID") ? "SEM ID" : `PACOTES ${comId ? "COM ID" : "SEM ID"}`}
            </div>

            <div class="nome">
                ${texto}
            </div>

            <div class="qr" id="qr${index}"></div>

            <div class="footer">
                <img src="https://luizoliveiraaa.github.io/Etiquetas-Mercadolivre/logokn.png">
                Equipe Inventario - Kuehne Nagel SAL1<br>
                Cada Pacote Importa!
            </div>
        `;

        page.appendChild(etiqueta);

        new QRCode(document.getElementById(`qr${index}`), {
            text: texto,
            width: 180,
            height: 180
        });

        count++;
    });

    setTimeout(() => window.print(), 500);
}

gerar();
</script>

</body>
</html>
