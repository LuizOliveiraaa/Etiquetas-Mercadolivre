<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Etiquetas</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<link rel="shortcut icon" type="image/jpg" href="/favicon.jpg"/>

<style>
@page {
    size: A4;
    margin: 0;
}

body { 
    margin:0; 
    font-family: Arial; 
}

/* PÁGINA */
.page {
    width: 210mm;
    height: 297mm;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 5mm;
    padding: 10mm;
    box-sizing: border-box;
    page-break-after: always;
}

/* ETIQUETA */
.etiqueta {
    border: 2px solid black;
    display: flex;
    flex-direction: column;
}

/* TOPO */
.topo {
    background: #ffe600;
    text-align: center;
    padding: 8px;
}

.topo img { 
    height: 55px;
    max-width: 100%;
    object-fit: contain;
}

/* TITULO */
.titulo {
    background: #eee;
    text-align: center;
    font-weight: bold;
    font-size: 14px;
    padding: 6px;
}

/* NOME */
.nome {
    text-align: center;
    font-size: 18px;
    padding: 8px;
    font-weight: bold;
}

/* QR */
.qr {
    display: flex;
    justify-content: center;
    align-items: center;
    flex-grow: 1;
    padding: 10px;
}

/* FOOTER */
.footer {
    background: #003a8f;
    text-align: center;
    padding: 8px;
    color: white;
    font-size: 12px;
}

.footer img { 
    height: 30px; 
    display: block;
    margin: 0 auto 5px;
    max-width: 100%;
    object-fit: contain;
}

/* TELA SEM DADOS */
.sem-dados {
    text-align: center;
    margin-top: 100px;
    font-size: 18px;
}
</style>
</head>

<body>

<div id="paginas"></div>

<script>
function getParametros() {
    const url = new URL(window.location.href);

    const dados = url.searchParams.get("dados");
    const inicio = url.searchParams.get("inicio");
    const fim = url.searchParams.get("fim");

    let lista = [];

    if (dados) {
        lista = dados.split(",");
    }
    else if (inicio && fim) {
        for (let i = parseInt(inicio); i <= parseInt(fim); i++) {
            lista.push("SEMID-" + i);
        }
    }

    return lista;
}

function gerar() {
    let lista = getParametros();
    let container = document.getElementById("paginas");

    if (!lista || lista.length === 0) {
        container.innerHTML = `
            <div class="sem-dados">
                <h2>Nenhum dado recebido</h2>
                <p>Use o AppSheet para gerar etiquetas automaticamente.</p>
                <br>
                <small>
                    Equipe Inventario - Kuehne Nagel SAL1<br>
                    Cada Pacote Importa!
                </small>
            </div>
        `;
        return;
    }

    let page;
    let count = 0;

    lista.forEach((item, index) => {

        let numero, tipo, comId;

        if (item.startsWith("SEMID")) {
            numero = item;
            tipo = "sem";
            comId = false;
        } else {
            [numero, tipo] = item.split("-");
            comId = tipo === "com";
        }

        if (count % 4 === 0) {
            page = document.createElement("div");
            page.className = "page";
            container.appendChild(page);
        }

        let texto;

        if (item.startsWith("SEMID")) {
            texto = numero;
        } else {
            texto = `G1_SAL${numero} ${comId ? "com ID" : "sem ID"}`;
        }

        let etiqueta = document.createElement("div");
        etiqueta.className = "etiqueta";

        etiqueta.innerHTML = `
            <div class="topo">
                <img src="https://upload.wikimedia.org/wikipedia/commons/0/04/Mercado_Libre_Logo.svg">
            </div>

            <div class="titulo">
                ${item.startsWith("SEMID") ? "SEM ID" : `PACOTES ${comId ? "COM ID" : "SEM ID"}`}
            </div>

            <div class="nome">
                ${texto}
            </div>

            <div class="qr" id="qr${index}"></div>

            <div class="footer">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5b/Kuehne_%2B_Nagel_logo.svg/512px-Kuehne_%2B_Nagel_logo.svg.png">
                Equipe Inventario - Kuehne Nagel SAL1<br>
                Cada Pacote Importa!
            </div>
        `;

        page.appendChild(etiqueta);

        new QRCode(document.getElementById(`qr${index}`), {
            text: texto,
            width: 180,
            height: 180
        });

        count++;
    });

    setTimeout(() => window.print(), 500);
}

gerar();
</script>

</body>
</html>
